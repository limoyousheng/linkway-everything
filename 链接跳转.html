<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fbf8ff">
    <title> 链接跳转</title>
    <!-- Tailwind CSS v3 (with forms + container-queries plugins) -->
    <script src="./tailwindcss.js"></script>
    <!-- Material Symbols Outlined + 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
    <link rel="preload" href="./material-symbols-outlined.woff2" as="font" type="font/woff2" crossorigin>
    <link href="./material-symbols-outlined.css" rel="stylesheet"/>
    <!-- SortableJS (拖拽) -->
    <script src="./sortable.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a03b56",
                        "inverse-surface": "#2d2f44",
                        "secondary-container": "#5ed8ff",
                        "outline-variant": "#dbc0c4",
                        "on-secondary-fixed-variant": "#004e61",
                        "background": "#fbf8ff",
                        "surface-container-low": "#f4f2ff",
                        "surface-variant": "#e0e0fc",
                        "on-primary-container": "#771b38",
                        "surface-dim": "#d7d8f4",
                        "surface-container": "#edecff",
                        "primary-fixed-dim": "#ffb1c0",
                        "on-tertiary-container": "#5a3800",
                        "surface-container-high": "#e6e6ff",
                        "on-secondary-fixed": "#001f28",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#b7eaff",
                        "on-tertiary-fixed-variant": "#643f00",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary": "#845400",
                        "surface-tint": "#a03b56",
                        "surface-container-highest": "#e0e0fc",
                        "on-primary-fixed": "#3f0016",
                        "on-surface": "#181a2e",
                        "on-primary-fixed-variant": "#81233f",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#5bd5fc",
                        "on-secondary": "#ffffff",
                        "surface": "#fbf8ff",
                        "primary-container": "#ff85a1",
                        "on-surface-variant": "#554245",
                        "inverse-on-surface": "#f1efff",
                        "tertiary-fixed-dim": "#ffb95a",
                        "on-tertiary-fixed": "#2a1800",
                        "primary-fixed": "#ffd9df",
                        "on-background": "#181a2e",
                        "tertiary-container": "#e49c31",
                        "on-secondary-container": "#005c72",
                        "inverse-primary": "#ffb1c0",
                        "outline": "#887175",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#fbf8ff",
                        "tertiary-fixed": "#ffddb6",
                        "error": "#ba1a1a",
                        "secondary": "#006780",
                        // 兼容旧色 key（给卡片色 / 分类色用）
                        "blue":   { 50:"#e3f2fd",100:"#bbdefb",500:"#5ed8ff",600:"#006780",700:"#004e61" },
                        "purple": { 50:"#f3e5f5",100:"#e1bee7",500:"#a855f7",600:"#7e22ce",700:"#581c87" },
                        "orange": { 50:"#fff3e0",100:"#ffe0b2",500:"#e49c31",600:"#845400",700:"#5a3800" },
                        "green":  { 50:"#e8f5e9",100:"#c8e6c9",500:"#10b981",600:"#047857",700:"#065f46" },
                        "pink":   { 50:"#fce4ec",100:"#f8bbd0",500:"#ff85a1",600:"#a03b56",700:"#771b38" },
                        "yellow": { 50:"#fffde7",100:"#fff9c4",500:"#facc15",600:"#ca8a04",700:"#854d0e" },
                        "cyan":   { 50:"#e0f7fa",100:"#b2ebf2",500:"#22d3ee",600:"#0e7490",700:"#155e75" },
                        "red":    { 50:"#ffebee",100:"#ffcdd2",500:"#ef4444",600:"#dc2626",700:"#991b1b" },
                        "teal":   { 50:"#e0f2f1",100:"#b2dfdb",500:"#14b8a6",600:"#0d9488",700:"#0f766e" },
                        "gray":   { 50:"#f9fafb",100:"#f3f4f6",500:"#9ca3af",600:"#4b5563",700:"#374151" }
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem"
                    },
                    spacing: {
                        "container-padding": "24px",
                        "margin-mobile": "16px",
                        "base": "8px",
                        "margin-desktop": "40px",
                        "gutter": "16px"
                    },
                    fontFamily: {
                        "headline-lg-mobile": ["Quicksand","sans-serif"],
                        "display-lg": ["Quicksand","sans-serif"],
                        "label-sm": ["Space Grotesk","sans-serif"],
                        "body-md": ["Plus Jakarta Sans","sans-serif"],
                        "headline-lg": ["Quicksand","sans-serif"],
                        "body-lg": ["Plus Jakarta Sans","sans-serif"],
                        "sans": ["Plus Jakarta Sans","system-ui","sans-serif"],
                        "clock": ["Ma Shan Zheng","ZCOOL XiaoWei","STKaiti","KaiTi","serif"]
                    },
                    animation: {
                        "float": "float 6s ease-in-out infinite",
                        "stagger-fade-in": "staggerFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards",
                        "pulse-slow": "pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite",
                        "spin-slow": "spin 8s linear infinite",
                        "magic-glow": "magicGlow 2s ease-in-out infinite",
                        "toast-in": "toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)"
                    },
                    keyframes: {
                        float: { "0%, 100%": { transform: "translateY(0)" }, "50%": { transform: "translateY(-12px)" } },
                        staggerFadeIn: { "0%": { opacity: "0", transform: "translateY(30px)" }, "100%": { opacity: "1", transform: "translateY(0)" } },
                        magicGlow: {
                            "0%, 100%": { boxShadow: "0 0 15px rgba(160, 59, 86, 0.2), inset 0 0 10px rgba(160, 59, 86, 0.1)" },
                            "50%": { boxShadow: "0 0 25px rgba(160, 59, 86, 0.5), inset 0 0 20px rgba(160, 59, 86, 0.2)" }
                        },
                        toastIn: { "0%": { opacity: "0", transform: "translate(-50%, 20px)" }, "100%": { opacity: "1", transform: "translate(-50%, 0)" } }
                    },
                    boxShadow: {
                        "glass-pink":   "0 16px 48px 0 rgba(255, 133, 161, 0.4)",
                        "glass-blue":   "0 16px 48px 0 rgba(94, 216, 255, 0.4)",
                        "glass-orange": "0 16px 48px 0 rgba(228, 156, 49, 0.4)",
                        "glass-purple": "0 16px 48px 0 rgba(224, 224, 252, 0.6)",
                        "glass-cyan":   "0 16px 48px 0 rgba(34, 211, 238, 0.4)",
                        "glass-amber":  "0 16px 48px 0 rgba(250, 204, 21, 0.4)",
                        "glass-red":    "0 16px 48px 0 rgba(239, 68, 68, 0.4)",
                        "glass-gray":   "0 16px 48px 0 rgba(156, 163, 175, 0.4)"
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .material-symbols-outlined {
                font-family: 'Material Symbols Outlined';
                font-weight: normal;
                font-style: normal;
                line-height: 1;
                letter-spacing: normal;
                text-transform: none;
                display: inline-block;
                white-space: nowrap;
                word-wrap: normal;
                direction: ltr;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                text-rendering: optimizeLegibility;
                font-feature-settings: 'liga';
                user-select: none;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                pointer-events: none;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .animate-float, .animate-stagger-fade-in, .animate-spin-slow, .animate-magic-glow { animation: none !important; opacity: 1; transform: none; }
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: #fbf8ff;
            color: #181a2e;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        input, textarea, [contenteditable="true"] {
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
        }
        html.dark body { background: #181a2e; color: #e6e6ff; }

        /* 背景纹理 + 渐变叠加 */
        .page-bg {
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            background-repeat: repeat;
        }
        .page-bg-overlay {
            background: linear-gradient(135deg, rgba(255, 217, 223, 0.6) 0%, rgba(255, 255, 255, 0) 50%, rgba(183, 234, 255, 0.5) 100%);
        }
        html.dark .page-bg-overlay {
            background: linear-gradient(135deg, rgba(160, 59, 86, 0.25) 0%, rgba(24, 26, 46, 0) 50%, rgba(0, 78, 97, 0.3) 100%);
        }

        /* 玻璃卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(160, 59, 86, 0.05);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            opacity: 0.5;
        }
        .glass-card:hover {
            transform: translateY(-8px) scale(1.03);
            border-color: rgba(255, 255, 255, 0.9);
        }
        html.dark .glass-card {
            background: rgba(45, 47, 68, 0.6);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* 深色模式文字颜色优化（覆盖 Tailwind text-* 工具类） */
        html.dark .text-on-surface { color: #f1efff !important; }
        html.dark .text-on-surface-variant { color: #d4c4c8 !important; }
        html.dark .text-outline { color: #c5b3b8 !important; }
        html.dark .text-on-background { color: #f1efff !important; }
        /* 卡片副文本（描述、域名等）在深色下用更亮一点的粉调 */
        html.dark .glass-card .text-on-surface-variant { color: #e8d4d8 !important; }
        /* 副标题背景在深色下用更深的容器色 */
        html.dark #page-subtitle { background: rgba(45, 47, 68, 0.7) !important; border-color: rgba(255, 177, 192, 0.2) !important; }
        /* 卡片底部链接域名文字 */
        html.dark .glass-card .text-outline { color: #ffb1c0 !important; }
        /* 空状态文字 */
        html.dark .text-on-surface-variant { color: #d4c4c8 !important; }
        /* 深色模式下 primary 在深色背景上更亮一点 */
        html.dark .text-primary { color: #ffb1c0 !important; }

        /* 8 个分类色玻璃卡变体（hover 阴影） */
        .glass-card-pink:hover   { box-shadow: 0 16px 48px 0 rgba(255, 133, 161, 0.4); }
        .glass-card-blue:hover   { box-shadow: 0 16px 48px 0 rgba(94, 216, 255, 0.4); }
        .glass-card-orange:hover { box-shadow: 0 16px 48px 0 rgba(228, 156, 49, 0.4); }
        .glass-card-purple:hover { box-shadow: 0 16px 48px 0 rgba(160, 59, 86, 0.4); }
        .glass-card-cyan:hover   { box-shadow: 0 16px 48px 0 rgba(34, 211, 238, 0.4); }
        .glass-card-amber:hover  { box-shadow: 0 16px 48px 0 rgba(250, 204, 21, 0.4); }
        .glass-card-red:hover    { box-shadow: 0 16px 48px 0 rgba(239, 68, 68, 0.4); }
        .glass-card-gray:hover   { box-shadow: 0 16px 48px 0 rgba(156, 163, 175, 0.4); }

        /* 自定义色玻璃卡：hover 阴影 + 标题色用 CSS 变量驱动 */
        .glass-card.has-custom-color:hover { box-shadow: 0 16px 48px 0 var(--cat-shadow, rgba(160, 59, 86, 0.3)); }
        .glass-card.has-custom-color h2 { transition: color 0.3s ease; }
        .glass-card.has-custom-color:hover h2 { color: var(--cat-c); }

        /* 自定义色侧边栏项：图标和激活态 */
        .nav-item-glow.has-custom-color .nav-item-icon { color: var(--cat-c); }
        .nav-item-glow.has-custom-color.active { background: var(--cat-soft, rgba(160, 59, 86, 0.12)); }
        .nav-item-glow.has-custom-color.active .nav-item-icon { color: var(--cat-c); }

        /* 浮动侧边栏 */
        .floating-sidebar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 8px 16px 32px 0 rgba(160, 59, 86, 0.1);
            border-radius: 2rem;
            transform-origin: 0 0;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        html.dark .floating-sidebar {
            background: rgba(45, 47, 68, 0.75);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 8px 16px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .floating-sidebar.collapsed {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.1) translateY(-60px);
        }

        /* 侧边栏分类 hover */
        .nav-item-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px 0 rgba(160, 59, 86, 0.1);
            background: rgba(255, 255, 255, 0.9);
        }
        html.dark .nav-item-glow:hover {
            background: rgba(45, 47, 68, 0.95);
            box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.4);
        }
        .nav-item-glow.active {
            background: rgba(255, 255, 255, 0.95);
            color: #a03b56;
            box-shadow: 0 4px 16px 0 rgba(160, 59, 86, 0.15);
        }
        html.dark .nav-item-glow.active {
            background: rgba(160, 59, 86, 0.18);
            color: #ffb1c0;
        }

        /* 魔法阵纹背景 */
        .magic-circle-bg {
            background-image:
                repeating-radial-gradient(circle at center, transparent 0, transparent 20px, rgba(160, 59, 86, 0.05) 20px, rgba(160, 59, 86, 0.05) 21px),
                repeating-conic-gradient(from 0deg, transparent 0deg, transparent 15deg, rgba(160, 59, 86, 0.05) 15deg, rgba(160, 59, 86, 0.05) 16deg);
        }

        /* 魔法阵弹窗 */
        .incantation-modal {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 133, 161, 0.3);
            border-radius: 50%;
            width: 640px;
            height: 640px;
            max-width: calc(100vw - 32px);
            max-height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 133, 161, 0.2), inset 0 0 30px rgba(255, 133, 161, 0.1);
            padding: 80px 64px;
        }
        .incantation-modal::before {
            content: '';
            position: absolute;
            inset: -20px;
            border: 1px dashed rgba(160, 59, 86, 0.4);
            border-radius: 50%;
            animation: spin-slow 20s linear infinite;
            pointer-events: none;
        }
        .incantation-modal::after {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(160, 59, 86, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }
        html.dark .incantation-modal {
            background: rgba(45, 47, 68, 0.9);
            border-color: rgba(255, 133, 161, 0.2);
            box-shadow: 0 0 50px rgba(160, 59, 86, 0.3), inset 0 0 30px rgba(160, 59, 86, 0.15);
        }

        /* 弹窗变体：方形（管理分类列表） */
        .incantation-modal-square {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 133, 161, 0.3);
            border-radius: 28px;
            width: 560px;
            max-width: calc(100vw - 32px);
            max-height: calc(100vh - 32px);
            padding: 28px;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 133, 161, 0.2), inset 0 0 30px rgba(255, 133, 161, 0.1);
            display: flex;
            flex-direction: column;
        }
        html.dark .incantation-modal-square {
            background: rgba(45, 47, 68, 0.9);
            border-color: rgba(255, 133, 161, 0.2);
        }

        /* 魔法阵按钮获取动效 */
        .pulse-glow { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(255, 133, 161, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 133, 161, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 133, 161, 0); }
        }

        /* 落下弹跳 */
        @keyframes settle-bounce-anim {
            0%   { transform: scale(1.08) rotate(3deg); }
            40%  { transform: scale(0.95) rotate(-1deg); }
            70%  { transform: scale(1.02) rotate(0.5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .settle-bounce { animation: settle-bounce-anim 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* SortableJS 拖拽视觉 */
        .sortable-ghost {
            opacity: 0.35;
            background: rgba(255, 255, 255, 0.55) !important;
            border: 2px dashed rgba(160, 59, 86, 0.5) !important;
            transform: scale(0.95) !important;
            filter: blur(1px);
        }
        html.dark .sortable-ghost {
            background: rgba(45, 47, 68, 0.5) !important;
            border-color: rgba(255, 177, 192, 0.55) !important;
        }
        /* 抓取时——只保留"卡片跟手"，不堆阴影/光晕；只在抓起瞬间弹一下（0.22s 后归位为原大小） */
        .sortable-drag {
            opacity: 1 !important;
            cursor: grabbing !important;
            z-index: 9999 !important;
            pointer-events: none !important;
            transition: none !important;
        }
        /* 弹跳动画加在内部卡片上（不影响 SortableJS 自己的定位 transform） */
        .sortable-drag .glass-card {
            animation: drag-pop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center;
        }
        @keyframes drag-pop {
            0%   { transform: scale(0.95); }
            55%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        /* 拖到目标位时：被拖的卡片本身变虚化（提示"可以放这里"） */
        .sortable-drag.drag-over-target {
            opacity: 0.55 !important;
            filter: blur(2px) brightness(1.05);
        }
        .sortable-item { cursor: grab; transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease; }
        .sortable-item:active { cursor: grabbing; }

        /* 拖到分类时高亮目标（半透明背景 + 主题色阴影，由 JS 注入 --dt-color 变量） */
        #sidebar-categories .sortable-item.drop-target > a,
        #sidebar-categories .sortable-item.drop-target > div[role="button"] {
            background: var(--dt-bg, rgba(160, 59, 86, 0.2)) !important;
            box-shadow:
                0 0 0 2px var(--dt-color, #a03b56),
                0 12px 30px -8px var(--dt-shadow, rgba(160, 59, 86, 0.6)) !important;
            transform: scale(1.04) !important;
            transition: all 0.18s ease !important;
        }
        #sidebar-categories .sortable-item.drop-target .material-symbols-outlined {
            color: var(--dt-color, #a03b56) !important;
            transform: scale(1.15) rotate(8deg);
            filter: drop-shadow(0 0 6px var(--dt-shadow, rgba(160, 59, 86, 0.6)));
        }
        /* 释放提示胶囊（伪元素） */
        #sidebar-categories .sortable-item.drop-target::after {
            content: '↓ 释放归位';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--dt-color, #a03b56);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 999px;
            pointer-events: none;
            box-shadow: 0 4px 12px -2px var(--dt-shadow, rgba(160, 59, 86, 0.6));
            animation: drop-pill-in 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            z-index: 5;
        }
        @keyframes drop-pill-in {
            from { opacity: 0; transform: translateY(-50%) translateX(8px) scale(0.8); }
            to   { opacity: 1; transform: translateY(-50%) translateX(0) scale(1); }
        }
        body.is-dragging * { cursor: grabbing !important; }
        body.is-resizing { user-select: none; cursor: col-resize; }
        body.is-resizing #floating-sidebar { transition: none !important; }

        /* 卡片图标悬停动画 */
        .icon-bounce-hover:hover .material-symbols-outlined { animation: icon-bounce 1.2s ease-in-out infinite; }
        .icon-rotate-hover:hover .material-symbols-outlined { animation: icon-rotate 1.2s ease-in-out infinite; }
        @keyframes icon-bounce {
            0%, 100% { transform: translateY(0) scale(1.1); }
            50% { transform: translateY(-4px) scale(1.1); }
        }
        @keyframes icon-rotate {
            0% { transform: rotate(0deg) scale(1.1); }
            25% { transform: rotate(15deg) scale(1.1); }
            75% { transform: rotate(-15deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1.1); }
        }

        /* toast */

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        'use strict';

        // ============================================
        // 常量与默认数据
        // ============================================
        const STORAGE_KEY = 'ai-nav-state-v1';
        const OTHER_CATEGORY_ID = 'cat-other';

        // 颜色 → 视觉（gradient = 顶部装饰色, bg = 胶囊背景, text = 胶囊文字, icon = Material Symbols 名）
        // 同时映射到 glass-card-{color} 变体
        const COLOR_MAP = {
            blue:   { gradient: 'from-blue-100 to-blue-500',     bg: 'bg-blue-100',   text: 'text-blue-700',   icon: 'chat_bubble',     shadow: 'shadow-glass-blue' },
            purple: { gradient: 'from-purple-100 to-purple-500', bg: 'bg-purple-100', text: 'text-purple-700', icon: 'image',           shadow: 'shadow-glass-purple' },
            green:  { gradient: 'from-green-100 to-green-500',   bg: 'bg-green-100',  text: 'text-green-700',  icon: 'code',            shadow: 'shadow-glass-gray' },
            red:    { gradient: 'from-red-100 to-red-500',       bg: 'bg-red-100',    text: 'text-red-700',    icon: 'palette',         shadow: 'shadow-glass-red' },
            cyan:   { gradient: 'from-cyan-100 to-cyan-500',     bg: 'bg-cyan-100',   text: 'text-cyan-700',   icon: 'sports_esports',  shadow: 'shadow-glass-cyan' },
            orange: { gradient: 'from-orange-100 to-orange-500', bg: 'bg-orange-100', text: 'text-orange-700', icon: 'movie',           shadow: 'shadow-glass-orange' },
            pink:   { gradient: 'from-pink-100 to-pink-500',     bg: 'bg-pink-100',   text: 'text-pink-700',   icon: 'music_note',      shadow: 'shadow-glass-pink' },
            yellow: { gradient: 'from-yellow-100 to-yellow-500', bg: 'bg-yellow-100', text: 'text-yellow-700', icon: 'school',          shadow: 'shadow-glass-amber' },
            teal:   { gradient: 'from-teal-100 to-teal-500',     bg: 'bg-teal-100',   text: 'text-teal-700',   icon: 'monitoring',      shadow: 'shadow-glass-gray' },
            gray:   { gradient: 'from-gray-100 to-gray-500',     bg: 'bg-gray-100',   text: 'text-gray-700',   icon: 'folder',          shadow: 'shadow-glass-gray' }
        };

        // 分类可选图标（20 个 Material Symbols）
        const CAT_ICONS = [
            'chat_bubble', 'image', 'movie', 'code', 'music_note', 'school', 'sports_esports', 'folder',
            'terminal', 'language', 'brush', 'science', 'psychology', 'memory', 'lightbulb', 'smart_toy',
            'auto_awesome', 'animation', 'graphic_eq', 'widgets'
        ];

        // hex 颜色派生（用于自定义色）
        function hexToRgb(hex) {
            const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex || '');
            if (!m) return null;
            return [parseInt(m[1], 16), parseInt(m[2], 16), parseInt(m[3], 16)];
        }
        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(v => Math.round(v).toString(16).padStart(2, '0')).join('');
        }
        function mixHex(hex, mixWith, ratio) {
            const a = hexToRgb(hex), b = hexToRgb(mixWith);
            if (!a || !b) return hex;
            return rgbToHex(a[0] * (1 - ratio) + b[0] * ratio, a[1] * (1 - ratio) + b[1] * ratio, a[2] * (1 - ratio) + b[2] * ratio);
        }
        // hex → CSS rgba 字符串（带透明度）
        function hexToRgba(hex, alpha) {
            const c = hexToRgb(hex);
            if (!c) return `rgba(160,59,86,${alpha})`;
            return `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
        }
        // 取分类主色（自定义色优先，否则用预设 RGB）
        function getCategoryHex(cat) {
            if (!cat) return COLOR_RGB.gray;
            if (cat.customColor) return cat.customColor;
            return COLOR_RGB[cat.color] || COLOR_RGB.gray;
        }
        // 把自定义色以 CSS 变量形式注入到元素上
        function applyCustomColorStyle(el, hex) {
            el.style.setProperty('--cat-c', hex);
            el.style.setProperty('--cat-soft', hexToRgba(hex, 0.18));
            el.style.setProperty('--cat-mid', hexToRgba(hex, 0.3));
            el.style.setProperty('--cat-shadow', hexToRgba(hex, 0.4));
        }
        // 清除自定义色
        function clearCustomColorStyle(el) {
            el.style.removeProperty('--cat-c');
            el.style.removeProperty('--cat-soft');
            el.style.removeProperty('--cat-mid');
            el.style.removeProperty('--cat-shadow');
        }

        // 主题色 RGB（用于 drop-target 阴影/背景；与 Tailwind 500 色一致）
        const COLOR_RGB = {
            blue:   '#3b82f6',
            purple: '#a855f7',
            green:  '#22c55e',
            red:    '#ef4444',
            cyan:   '#06b6d4',
            orange: '#f97316',
            pink:   '#ec4899',
            yellow: '#eab308',
            teal:   '#14b8a6',
            gray:   '#6b7280'
        };

        function applyDropTargetStyle(el, colorKeyOrCat) {
            const c = typeof colorKeyOrCat === 'string' && (colorKeyOrCat.startsWith('#') || colorKeyOrCat.length === 7)
                ? colorKeyOrCat
                : (COLOR_RGB[colorKeyOrCat] || COLOR_RGB.gray);
            el.style.setProperty('--dt-color', c);
            el.style.setProperty('--dt-shadow', c + '99');
            el.style.setProperty('--dt-bg', c + '33');
        }

        // SortableJS 状态（提前声明，避免 setSidebarCollapsed 在初始化时 TDZ）
        let sidebarSortable = null;
        let cardSortable = null;
        let _lastHoverCatId = null;
        let _isDragging = false;
        let _draggedEl = null;
        let _lastMouseX = null;
        let _lastMouseY = null;

        const DEFAULT_CATEGORIES = [
            { id: 'cat-chat',     name: '聊天AI',   color: 'blue' },
            { id: 'cat-image',    name: '图片生成', color: 'purple' },
            { id: 'cat-video',    name: '视频生成', color: 'orange' },
            { id: 'cat-dev',      name: '开发平台', color: 'green' },
            { id: 'cat-audio',    name: '音频处理', color: 'pink' },
            { id: 'cat-edu',      name: '教育学习', color: 'yellow' },
            { id: 'id-9kdn12gmq4zxg1s', name: '游戏', color: 'cyan' },
            { id: OTHER_CATEGORY_ID, name: '其他',  color: 'gray' }
        ];

        // 用 Google 的 favicon 端点统一生成图标：稳定、无 CORS 问题、自动跟随站点
        const favicon = domain => `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;

        // 自动抓站点真实 favicon
        async function testImageLoad(url) {
            return new Promise(resolve => {
                const img = new Image();
                let done = false;
                const finish = ok => { if (!done) { done = true; resolve(ok); } };
                img.onload = () => finish(img.naturalWidth > 0);
                img.onerror = () => finish(false);
                img.src = url;
                setTimeout(() => finish(false), 4000);
            });
        }

        function joinFaviconIco(siteUrl) {
            try {
                const u = new URL(siteUrl);
                const origin = u.origin;
                return origin.endsWith('/') ? origin + 'favicon.ico' : origin + '/favicon.ico';
            } catch (e) { return null; }
        }

        function resolveIconHref(siteUrl, href) {
            if (!href) return null;
            try {
                if (/^https?:\/\//i.test(href)) return href;
                if (href.startsWith('//')) return new URL(siteUrl).protocol + href;
                return new URL(href, siteUrl).toString();
            } catch (e) { return null; }
        }

        async function fetchFavicon(siteUrl) {
            if (!siteUrl) return null;
            let normalized = siteUrl.trim();
            if (!/^https?:\/\//i.test(normalized)) normalized = 'https://' + normalized;
            try { new URL(normalized); } catch (e) { return null; }

            // 找远程图标 URL（favicon.ico 或 <link rel=icon>）
            let remoteUrl = null;
            const favIco = joinFaviconIco(normalized);
            if (favIco && await testImageLoad(favIco)) remoteUrl = favIco;

            if (!remoteUrl) {
                try {
                    const proxy = 'http://127.0.0.1:9001/fetch-html?url=' + encodeURIComponent(normalized);
                    const r = await fetch(proxy, { cache: 'no-store' });
                    if (!r.ok) return null;
                    const html = await r.text();
                    const re = /<link\b[^>]*?>/gi;
                    let m;
                    while ((m = re.exec(html)) !== null) {
                        const tag = m[0];
                        const rel = (tag.match(/\brel\s*=\s*["']([^"']+)["']/i) || [])[1] || '';
                        if (!/icon/i.test(rel)) continue;
                        const href = (tag.match(/\bhref\s*=\s*["']([^"']+)["']/i) || [])[1];
                        const abs = resolveIconHref(normalized, href);
                        if (abs && await testImageLoad(abs)) { remoteUrl = abs; break; }
                    }
                } catch (e) {}
            }
            if (!remoteUrl) return null;

            // 通过 state-server 下载到 ./icons/ 并返回本地 URL；离线也至少能用浏览器缓存或 fallback
            return await cacheIcon(remoteUrl) || remoteUrl;
        }

        // 把远程图标 URL 交给 state-server 存到 ./icons/，返回本地 URL（http://127.0.0.1:9001/icons/<hash>.<ext>）。
        // 若 state-server 不可用，返回 null（让调用方继续用远程 URL）。
        async function cacheIcon(remoteUrl) {
            if (!remoteUrl || remoteUrl.startsWith('data:')) return remoteUrl || null;
            try {
                const r = await fetch('http://127.0.0.1:9001/save-icon?url=' + encodeURIComponent(remoteUrl), { cache: 'no-store' });
                if (!r.ok) return null;
                const j = await r.json();
                return j.localUrl || null;
            } catch (e) { return null; }
        }

        // 删除 ./icons/ 里的文件（仅当 iconUrl 指向本地时调用）
        async function deleteLocalIcon(iconUrl) {
            if (!iconUrl) return;
            // 只处理本地 icons 路径：http://127.0.0.1:9001/icons/<file>
            const m = /^http:\/\/127\.0\.0\.1:\d+\/icons\/(.+)$/.exec(iconUrl);
            if (!m) return;
            try {
                await fetch('http://127.0.0.1:9001/delete-icon?filename=' + encodeURIComponent(m[1]), { cache: 'no-store' });
            } catch (e) {}
        }

            } catch (e) { return null; }
        }

        function syncStateToServer(payload) {
            try {
                const body = JSON.stringify({
                    categories: payload.categories || state.categories,
                    cards: payload.cards || state.cards,
                    theme: payload.theme || state.theme
                });
                if (navigator.sendBeacon) {
                    const blob = new Blob([body], { type: 'application/json' });
                    navigator.sendBeacon('http://127.0.0.1:9001/state', blob);
                } else {
                    fetch('http://127.0.0.1:9001/state', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body,
                        keepalive: true
                    }).catch(() => {});
                }
            } catch (e) {}
        }

        function saveState() {
            try {
                const payload = { categories: state.categories, cards: state.cards, theme: state.theme };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
                syncStateToServer(payload);
            } catch (e) {}
        }

        if (!state) {
            state = {
                categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)),
                cards: JSON.parse(JSON.stringify(DEFAULT_CARDS)),
                theme: 'light',
                view: 'hub',
                currentCategoryId: null
            };
        }
        if (!state.theme) state.theme = 'light';
        if (!state.view) state.view = 'hub';
        if (state.currentCategoryId === undefined) state.currentCategoryId = null;
        syncStateToServer(state);

        (async function autofillIcons() {
            const targets = state.cards.filter(c => !c.iconUrl);
            if (targets.length === 0) return;
            let changed = false;
            for (const c of targets) {
                if (!c.url) continue;
                try {
                    const got = await fetchFavicon(c.url);
                    if (got) { c.iconUrl = got; changed = true; }
                } catch (e) {}
            }
            if (changed) { saveState(); renderAll(); }
        })();

        (async function autofillDescriptions() {
            const targets = state.cards.filter(c => !c.description);
            if (targets.length === 0) return;
            let changed = false;
            for (const c of targets) {
                if (!c.url) continue;
                try {
                    const meta = await autoFillDescription(c.url);
                    if (meta && (meta.description || meta.title)) {
                        c.description = (meta.description || meta.title).trim();
                        changed = true;
                    }
                } catch (e) {}
            }
            if (changed) { saveState(); renderAll(); }
        })();

        // ============================================
        // 工具函数
        // ============================================
        function uid() { return 'id-' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36); }
        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
        }
        function extractDomain(url) {
            try { return new URL(url).hostname.replace('www.', ''); } catch (e) { return url || ''; }
        }
        function isMobile() {
            return window.innerWidth < 1024;
        }
        function applyMobileLayoutClass() {
            document.documentElement.dataset.layout = isMobile() ? 'mobile' : 'desktop';
        }
        window.addEventListener('resize', () => {
            applyMobileLayoutClass();
        });
        function getCategory(id) { return state.categories.find(c => c.id === id); }
        function getCategoryColor(id) { const c = getCategory(id); return c ? c.color : 'gray'; }
        function categoryExists(id) { return state.categories.some(c => c.id === id); }
        function ensureOtherCategory() {
            if (!categoryExists(OTHER_CATEGORY_ID)) {
                state.categories.push({ id: OTHER_CATEGORY_ID, name: '其他', color: 'gray' });
            }
        }

        // ============================================
        // 渲染
        // ============================================
        function renderSidebarCategories() {
            const container = document.getElementById('sidebar-categories');
            container.innerHTML = '';
            state.categories.forEach(cat => {
                const cm = COLOR_MAP[cat.color] || COLOR_MAP.gray;
                const isOther = cat.id === OTHER_CATEGORY_ID;
                const isActive = activeCategoryId === cat.id;
                const catIcon = cat.icon || cm.icon;
                const isCustom = !!cat.customColor;
                const a = document.createElement('a');
                a.className = 'sortable-item nav-item-glow flex items-center px-4 py-3 rounded-2xl transition-all group whitespace-nowrap' + (isActive ? ' active' : '') + (isCustom ? ' has-custom-color' : '');
                a.dataset.catId = cat.id;
                if (isCustom) {
                    const hex = cat.customColor;
                    a.style.setProperty('--cat-c', hex);
                    a.style.setProperty('--cat-soft', hexToRgba(hex, 0.18));
                    a.style.setProperty('--cat-mid', hexToRgba(hex, 0.3));
                    a.style.setProperty('--cat-shadow', hexToRgba(hex, 0.4));
                }
                const iconClass = isActive
                    ? 'nav-item-icon material-symbols-outlined flex-shrink-0 text-primary transition-colors'
                    : 'nav-item-icon material-symbols-outlined flex-shrink-0 text-on-surface-variant group-hover:text-primary transition-colors';
                a.innerHTML = `
                    <span class="${iconClass}" title="" aria-hidden="true" style="font-variation-settings: 'FILL' 1;">${catIcon}</span>
                    <span class="nav-text font-body-md font-medium ml-4">${escapeHtml(cat.name)}</span>
                `;
                a.addEventListener('click', e => {
                    e.preventDefault();
                    if (e.target.closest('[data-action]')) return;
                    activeCategoryId = cat.id;
                    updateActiveCategory();
                    renderCards();
                    updatePageHeader();
                });
                container.appendChild(a);
            });
        }

        function updateActiveCategory() {
            document.querySelectorAll('#sidebar-categories a, #nav-all').forEach(el => {
                el.classList.toggle('active', el.dataset.catId === activeCategoryId);
            });
        }

        function buildCardElement(card, index) {
            const color = getCategoryColor(card.categoryId);
            const cm = COLOR_MAP[color] || COLOR_MAP.gray;
            const cat = getCategory(card.categoryId);
            const catName = cat ? cat.name : '其他';
            const domain = extractDomain(card.url);
            const staggerClass = `stagger-${Math.min(index + 1, 6)}`;
            const catIcon = cat ? (cat.icon || (COLOR_MAP[cat.color] || COLOR_MAP.gray).icon) : cm.icon;
            const isCustom = cat && cat.customColor;
            const catHex = cat ? getCategoryHex(cat) : (COLOR_RGB[color] || COLOR_RGB.gray);

            const iconHtml = card.iconUrl
                ? `<img src="${escapeHtml(card.iconUrl)}" alt="${escapeHtml(card.name)}" class="w-8 h-8 object-contain" width="32" height="32" data-favicon-fallback="${escapeHtml(catIcon)}">`
                : `<span class="material-symbols-outlined text-on-primary-container text-2xl" title="" aria-hidden="true" style="font-variation-settings: 'FILL' 1;">${catIcon}</span>`;

            const wrapper = document.createElement('div');
            wrapper.className = `sortable-item relative h-full`;
            wrapper.dataset.cardId = card.id;
            wrapper.dataset.categoryId = card.categoryId;
            const cardClass = isCustom
                ? 'glass-card has-custom-color'
                : `glass-card glass-card-${color}`;
            const iconBgStyle = isCustom ? `style="background: var(--cat-soft, ${hexToRgba(catHex, 0.2)});"` : '';
            const titleHoverClass = color === 'gray' ? 'group-hover:text-primary' : `group-hover:text-${color}-600`;
            const cardStyleParts = [`animation-duration: ${5 + (index % 5) * 0.3}s;`];
            if (isCustom) {
                cardStyleParts.push(`--cat-c: ${catHex};`);
                cardStyleParts.push(`--cat-soft: ${hexToRgba(catHex, 0.18)};`);
                cardStyleParts.push(`--cat-mid: ${hexToRgba(catHex, 0.3)};`);
                cardStyleParts.push(`--cat-shadow: ${hexToRgba(catHex, 0.4)};`);
            }
            wrapper.innerHTML = `
                <a href="${escapeHtml(card.url)}" target="_blank" rel="noopener" class="${cardClass} rounded-[2rem] p-8 flex flex-col gap-4 group animate-stagger-fade-in ${staggerClass} animate-float h-full block" style="${cardStyleParts.join(' ')}">
                    <div class="flex items-start justify-between">
                        <div class="w-14 h-14 rounded-2xl ${isCustom ? '' : `bg-${color}-100`} flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform duration-300 icon-bounce-hover shadow-inner" ${iconBgStyle}>
                            ${iconHtml}
                        </div>
                        <button class="card-menu-btn w-10 h-10 rounded-full bg-white/60 hover:bg-white/90 flex items-center justify-center transition-colors" aria-label="更多操作" type="button" data-card-id="${escapeHtml(card.id)}">
                            <span class="material-symbols-outlined text-on-surface-variant text-lg">more_vert</span>
                        </button>
                    </div>
                    <div>
                        <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2 ${titleHoverClass} transition-colors">${escapeHtml(card.name)}</h2>
                        <p class="font-body-md text-body-md text-on-surface-variant opacity-80 line-clamp-2">${escapeHtml(card.description || '暂无描述')}</p>
                    </div>
                    <div class="mt-auto pt-4 border-t border-primary/10 text-xs text-outline flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">link</span>
                        <span class="truncate flex-1">${escapeHtml(catName)} · ${escapeHtml(domain)}</span>
                    </div>
                </a>
            `;
            // 图标加载失败 → 回退到 Material Symbols 文字
            const iconImg = wrapper.querySelector('img[data-favicon-fallback]');
            if (iconImg) {
                const fallbackIcon = iconImg.dataset.faviconFallback;
                iconImg.addEventListener('error', () => {
                    iconImg.outerHTML = `<span class="material-symbols-outlined text-on-primary-container text-2xl" title="" aria-hidden="true" style="font-variation-settings: 'FILL' 1;">${fallbackIcon}</span>`;
                });
            }
            const menuBtn = wrapper.querySelector('.card-menu-btn');
            menuBtn.addEventListener('click', e => {
                e.preventDefault();
                e.stopPropagation();
                openCardActions(menuBtn, card.id);
            });
            // 让菜单按钮阻止拖拽
            menuBtn.addEventListener('mousedown', e => e.stopPropagation());
            menuBtn.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
            return wrapper;
        }

        function renderCards() {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            const visible = state.cards.filter(card => {
                if (activeCategoryId !== 'all' && card.categoryId !== activeCategoryId) return false;
                if (searchTerm) {
                    const t = searchTerm;
                    return (card.name || '').toLowerCase().includes(t)
                        || (card.description || '').toLowerCase().includes(t)
                        || (card.url || '').toLowerCase().includes(t)
                        || (getCategory(card.categoryId)?.name || '').toLowerCase().includes(t);
                }
                return true;
            });
            if (visible.length === 0) {
                const msg = searchTerm
                    ? `没有匹配「${searchTerm}」的维度`
                    : (activeCategoryId === 'all' ? '还没有任何站点，点右上「刻印新站点」开始' : '此分类下还没有站点');
                grid.innerHTML = `<div class="col-span-full text-center text-on-surface-variant py-16 font-body-md text-lg">${escapeHtml(msg)}</div>`;
                return;
            }
            visible.forEach((card, idx) => grid.appendChild(buildCardElement(card, idx)));
            // 重新绑定 SortableJS（renderAll 后 DOM 重建）
            rebindCardSortable();
        }

        function renderStats() {
            document.getElementById('stat-platforms-text').textContent = state.cards.length + ' 个平台';
            document.getElementById('stat-categories-text').textContent = state.categories.length + ' 个分类';
        }

        function updatePageHeader() {
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            if (activeCategoryId === 'all') {
                title.textContent = '链接万物  随心跳转';
                subtitle.textContent = '欢迎回来，朋友！当前页面已刻印你添加的维度链接。';
            } else {
                const cat = getCategory(activeCategoryId);
                title.textContent = cat ? cat.name : 'Unknown';
                subtitle.textContent = `当前领域：${cat ? cat.name : '未知'}。长按卡片以重排，拖到侧边栏分类可移动。`;
            }
        }

        function renderCategorySelect() {
            const sel = document.getElementById('site-category');
            sel.innerHTML = '';
            state.categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.textContent = cat.name;
                sel.appendChild(opt);
            });
        }

        function renderCategoryManageList() {
            const ul = document.getElementById('category-manage-list');
            ul.innerHTML = '';
            state.categories.forEach(cat => {
                const count = state.cards.filter(c => c.categoryId === cat.id).length;
                const cm = COLOR_MAP[cat.color] || COLOR_MAP.gray;
                const currentIcon = cat.icon || cm.icon;
                const isOther = cat.id === OTHER_CATEGORY_ID;
                const currentHex = cat.customColor || (COLOR_RGB[cat.color] || COLOR_RGB.gray);
                const li = document.createElement('li');
                li.className = 'cat-manage-item';
                li.dataset.catId = cat.id;
                li.style.position = 'relative';
                const swatchesHtml = Object.keys(COLOR_MAP).map(key => {
                    const isCurrent = !cat.customColor && key === cat.color;
                    return `<button type="button" class="cat-color-swatch${isCurrent ? ' is-current' : ''}" data-swatch-color="${key}" style="background:${COLOR_RGB[key] || COLOR_RGB.gray};" title="${key}"></button>`;
                }).join('');
                const iconsHtml = CAT_ICONS.map(ic => {
                    const isCurrent = ic === currentIcon;
                    return `<button type="button" class="cat-icon-pick${isCurrent ? ' is-current' : ''}" data-icon-pick="${ic}" title="${ic}"><span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 1;">${ic}</span></button>`;
                }).join('');
                li.innerHTML = `
                    <button type="button" class="cat-color-btn" data-color-picker-id="${cat.id}" style="background:${currentHex};" title="点击更换颜色" aria-label="更换颜色"></button>
                    <button type="button" class="cat-icon-btn" data-icon-picker-id="${cat.id}" title="点击更换图标" aria-label="更换图标">
                        <span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 1;">${currentIcon}</span>
                    </button>
                    <input type="text" value="${escapeHtml(cat.name)}" data-cat-id="${cat.id}" class="flex-1 bg-transparent text-sm font-body-md focus:outline-none px-2 py-1 rounded border border-transparent focus:border-primary/30 min-w-0" ${isOther ? 'readonly' : ''}>
                    <span class="text-xs text-outline shrink-0 font-label-sm">${count}</span>
                    ${isOther ? '' : `<button data-rename-id="${cat.id}" type="button" class="magic-btn-mini"><span class="material-symbols-outlined text-xs">save</span>保存</button>`}
                    <button data-delete-id="${cat.id}" type="button" class="magic-btn-mini" style="background:rgba(186,26,26,0.1);color:#ba1a1a;" ${isOther ? 'disabled style="opacity:.4;cursor:not-allowed;background:rgba(186,26,26,0.05);color:#ba1a1a;"' : ''}><span class="material-symbols-outlined text-xs">delete</span>删</button>
                    <div class="cat-color-popover hidden" data-color-popover-for="${cat.id}">
                        <div>
                            <div class="cat-color-section-title">预设色</div>
                            <div class="cat-color-grid">${swatchesHtml}</div>
                        </div>
                        <div>
                            <div class="cat-color-section-title">自定义</div>
                            <div class="cat-color-custom-row">
                                <input type="color" class="cat-color-input" data-custom-color value="${currentHex}">
                                <span class="cat-color-hex">${currentHex}</span>
                            </div>
                            ${cat.customColor ? '<button type="button" class="cat-color-reset mt-1" data-reset-custom-color><span class="material-symbols-outlined" style="font-size:13px;">restart_alt</span>重置为预设</button>' : ''}
                        </div>
                    </div>
                    <div class="cat-icon-popover hidden" data-icon-popover-for="${cat.id}">${iconsHtml}</div>
                `;
                ul.appendChild(li);
            });
            // 关掉所有 popover 的工具
            const closeAllPopovers = () => {
                ul.querySelectorAll('.cat-color-popover, .cat-icon-popover').forEach(p => p.classList.add('hidden'));
            };
            // 颜色快选：点开/关闭
            ul.querySelectorAll('[data-color-picker-id]').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const id = btn.dataset.colorPickerId;
                    const pop = ul.querySelector(`[data-color-popover-for="${id}"]`);
                    if (!pop) return;
                    const isOpen = !pop.classList.contains('hidden');
                    closeAllPopovers();
                    if (!isOpen) pop.classList.remove('hidden');
                });
            });
            // 图标快选：点开/关闭
            ul.querySelectorAll('[data-icon-picker-id]').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const id = btn.dataset.iconPickerId;
                    const pop = ul.querySelector(`[data-icon-popover-for="${id}"]`);
                    if (!pop) return;
                    const isOpen = !pop.classList.contains('hidden');
                    closeAllPopovers();
                    if (!isOpen) pop.classList.remove('hidden');
                });
            });
            // 预设选色
            ul.querySelectorAll('[data-swatch-color]').forEach(sw => {
                sw.addEventListener('click', e => {
                    e.stopPropagation();
                    const li = sw.closest('li');
                    if (!li) return;
                    const id = li.dataset.catId;
                    const newColor = sw.dataset.swatchColor;
                    const cat = getCategory(id);
                    if (!cat) return;
                    if (cat.color === newColor && !cat.customColor) {
                        closeAllPopovers();
                        return;
                    }
                    cat.color = newColor;
                    delete cat.customColor; // 选预设就清掉自定义
                    saveState();
                    renderAll();
                    renderCategoryManageList();
                    showToast(`已切换为「${newColor}」色`, cat);
                });
            });
            // 自定义色（input 实时改预览，change 关闭 popover）
            ul.querySelectorAll('[data-custom-color]').forEach(inp => {
                inp.addEventListener('input', e => {
                    e.stopPropagation();
                    const li = inp.closest('li');
                    if (!li) return;
                    const id = li.dataset.catId;
                    const cat = getCategory(id);
                    if (!cat) return;
                    const hex = inp.value;
                    cat.customColor = hex;
                    const hexEl = li.querySelector('.cat-color-hex');
                    if (hexEl) hexEl.textContent = hex;
                    let resetBtn = li.querySelector('[data-reset-custom-color]');
                    if (!resetBtn) {
                        resetBtn = document.createElement('button');
                        resetBtn.type = 'button';
                        resetBtn.className = 'cat-color-reset mt-1';
                        resetBtn.dataset.resetCustomColor = '';
                        resetBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:13px;">restart_alt</span>重置为预设';
                        resetBtn.addEventListener('click', e => {
                            e.stopPropagation();
                            delete cat.customColor;
                            saveState();
                            renderAll();
                            renderCategoryManageList();
                            showToast('已重置为预设色', cat);
                        });
                        inp.closest('.cat-color-popover').appendChild(resetBtn);
                    }
                    const colorBtn = li.querySelector('[data-color-picker-id]');
                    if (colorBtn) colorBtn.style.background = hex;
                    saveState();
                    renderAll();
                });
                // change 事件：原生 picker 关闭后 → 关闭 popover
                inp.addEventListener('change', e => {
                    e.stopPropagation();
                    closeAllPopovers();
                    showToast('已应用自定义色', cat);
                });
                // 防止打开原生 picker 时冒泡触发 close
                inp.addEventListener('click', e => e.stopPropagation());
            });
            // 重置为预设（已存在的按钮）
            ul.querySelectorAll('[data-reset-custom-color]').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const li = btn.closest('li');
                    if (!li) return;
                    const cat = getCategory(li.dataset.catId);
                    if (!cat) return;
                    delete cat.customColor;
                    saveState();
                    renderAll();
                    renderCategoryManageList();
                    showToast('已重置为预设色', cat);
                });
            });
            // 选图标
            ul.querySelectorAll('[data-icon-pick]').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const li = btn.closest('li');
                    if (!li) return;
                    const id = li.dataset.catId;
                    const newIcon = btn.dataset.iconPick;
                    const cat = getCategory(id);
                    if (!cat) return;
                    const currentIcon = cat.icon || (COLOR_MAP[cat.color] || COLOR_MAP.gray).icon;
                    if (currentIcon === newIcon) {
                        closeAllPopovers();
                        return;
                    }
                    cat.icon = newIcon;
                    saveState();
                    renderAll();
                    renderCategoryManageList();
                    showToast('已更换图标', cat);
                });
            });
            ul.querySelectorAll('[data-rename-id]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.renameId;
                    const input = ul.querySelector(`input[data-cat-id="${id}"]`);
                    const newName = (input.value || '').trim();
                    if (!newName) { showToast('分类名不能为空'); return; }
                    if (state.categories.some(c => c.id !== id && c.name === newName)) { showToast('分类名已存在'); return; }
                    const cat = getCategory(id);
                    if (cat) cat.name = newName;
                    saveState();
                    renderAll();
                    renderCategoryManageList();
                    showToast('已重命名', cat);
                });
            });
            ul.querySelectorAll('[data-delete-id]:not([disabled])').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.deleteId;
                    const cat = getCategory(id);
                    if (!cat) return;
                    const count = state.cards.filter(c => c.categoryId === id).length;
                    const msg = count > 0
                        ? `分类「${cat.name}」下有 ${count} 个站点，删除后这些站点会移到「其他」。\n确定继续吗？`
                        : `确定删除分类「${cat.name}」？`;
                    const ok = await showConfirm({
                        title: '确认删除',
                        message: msg,
                        okText: '删除',
                        danger: true,
                        icon: 'delete_forever'
                    });
                    if (!ok) return;
                    ensureOtherCategory();
                    state.cards.forEach(c => { if (c.categoryId === id) c.categoryId = OTHER_CATEGORY_ID; });
                    state.categories = state.categories.filter(c => c.id !== id);
                    if (activeCategoryId === id) activeCategoryId = 'all';
                    saveState();
                    renderAll();
                    renderCategoryManageList();
                    showToast('已删除分类', cat);
                });
            });
        }

        function renderMoveSubmenu() {
            const submenu = document.getElementById('move-submenu');
            submenu.innerHTML = '';
            if (!activePopoverCardId) return;
            const card = state.cards.find(c => c.id === activePopoverCardId);
            state.categories.forEach(cat => {
                const isCurrent = card && card.categoryId === cat.id;
                const cm = COLOR_MAP[cat.color] || COLOR_MAP.gray;
                const catIcon = cat.icon || cm.icon;
                const isCustom = !!cat.customColor;
                const iconStyle = isCustom ? `style="color: ${cat.customColor}; font-variation-settings: 'FILL' 1;"` : `style="font-variation-settings: 'FILL' 1;"`;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'w-full text-left px-4 py-2 text-sm flex items-center gap-2 transition-colors';
                btn.innerHTML = `<span class="material-symbols-outlined text-base" ${iconStyle}>${catIcon}</span><span class="flex-1">${escapeHtml(cat.name)}</span>${isCurrent ? '<span class="material-symbols-outlined text-primary text-base">check</span>' : ''}`;
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    if (card && card.categoryId !== cat.id) {
                        card.categoryId = cat.id;
                        saveState();
                        renderAll();
                        showToast(`已移动到「${cat.name}」`, cat);
                    }
                    closeCardActions();
                });
                submenu.appendChild(btn);
            });
        }

        function renderAll() {
            renderSidebarCategories();
            renderCards();

        function showConfirm({ title = '确认操作', message = '', okText = '确定', cancelText = '取消', danger = false, icon = 'help', imageUrl = null } = {}) {
            return new Promise(resolve => {
                confirmTitle.textContent = title;

                confirmCancelBtn.textContent = cancelText;
                const iconEl = document.getElementById('confirm-icon');

                } else {
                    iconEl.outerHTML = '<span id="confirm-icon" class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: \'FILL\' 1;">' + icon + '</span>';
                }
                if (danger) {
                    confirmOkBtn.style.background = '#ba1a1a';
                    confirmOkBtn.style.boxShadow = '0 4px 12px rgba(186, 26, 26, 0.3)';
                } else {
                    confirmOkBtn.style.background = '';
                    confirmOkBtn.style.boxShadow = '';
                }
                const cleanup = (val) => {
                    confirmModal.classList.add('hidden');
                    confirmOkBtn.onclick = null;
                    confirmCancelBtn.onclick = null;
                    confirmBackdrop.onclick = null;
                    resolve(val);
                };
                confirmOkBtn.onclick = () => cleanup(true);
                confirmCancelBtn.onclick = () => cleanup(false);
                confirmBackdrop.onclick = () => cleanup(false);
                confirmModal.classList.remove('hidden');
                confirmModal.classList.add('flex');
                setTimeout(() => confirmOkBtn.focus(), 50);

        function showToast(message, tone) {
            const toast = document.createElement('div');
            toast.className = 'toast-themed';
            toast.textContent = message;
            // tone 接受分类对象或 hex 字符串；不传则用默认粉
            if (tone) {
                const hex = (typeof tone === 'string') ? tone : (tone.customColor || (COLOR_RGB[tone.color] || COLOR_RGB.gray));
                const rgb = hexToRgb(hex);
                if (rgb) {
                    const [r, g, b] = rgb;
                    toast.style.setProperty('--toast-c', hex);
                    toast.style.setProperty('--toast-c-rgba18', `rgba(${r},${g},${b},0.18)`);
                    toast.style.setProperty('--toast-c-rgba25', `rgba(${r},${g},${b},0.25)`);
                    toast.style.setProperty('--toast-c-rgba35', `rgba(${r},${g},${b},0.35)`);
                    toast.style.setProperty('--toast-c-rgba40', `rgba(${r},${g},${b},0.4)`);
                }
            }
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                toast.style.transition = 'all 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================

        // 全局拖动跟踪：跟踪鼠标坐标 + 找到鼠标下的合法分类项并高亮 + 标记被拖卡片在目标位
        function onDragMove(e) {
            _lastMouseX = e.clientX;
            _lastMouseY = e.clientY;
            if (!_isDragging) return;
            const list = document.getElementById('sidebar-categories');
            if (!list) return;
            // 折叠态不接收 drop，不做高亮，也不让被拖卡片虚化
            if (isSidebarCollapsed) {
                if (_lastHoverCatId !== null) {
                    list.querySelectorAll('.sortable-item.drop-target').forEach(el => el.classList.remove('drop-target'));
                    _lastHoverCatId = null;
                }
                const drag = document.querySelector('.sortable-drag');
                if (drag) drag.classList.remove('drag-over-target');
                return;
            }
            const el = document.elementFromPoint(e.clientX, e.clientY);
            const catItem = el ? el.closest('#sidebar-categories .sortable-item[data-cat-id]') : null;
            // 排除 "all" / "创建分类" 等非法目标
            const catId = (catItem && catItem.dataset.catId && catItem.dataset.catId !== 'all') ? catItem.dataset.catId : null;
            if (catId === _lastHoverCatId) return;
            // 切高亮
            list.querySelectorAll('.sortable-item.drop-target').forEach(el => el.classList.remove('drop-target'));
            if (catItem && catId) {
                catItem.classList.add('drop-target');
                const cat = state.categories.find(c => c.id === catId);
                if (cat) applyDropTargetStyle(catItem, getCategoryHex(cat));
            }
            // 被拖卡片虚化（仅当落在合法目标时）
            const drag = document.querySelector('.sortable-drag');
            if (drag) {
                if (catItem && catId) {
                    const cat = state.categories.find(c => c.id === catId);
                    if (cat) {
                        applyDropTargetStyle(drag, getCategoryHex(cat));
                        drag.classList.add('drag-over-target');
                    }
                } else {
                    drag.classList.remove('drag-over-target');
                }
            }
            _lastHoverCatId = catId;
        }

        function clearDropHighlights() {
            const list = document.getElementById('sidebar-categories');
            if (!list) return;
            list.querySelectorAll('.sortable-item.drop-target').forEach(el => el.classList.remove('drop-target'));
            const drag = document.querySelector('.sortable-drag');
            if (drag) drag.classList.remove('drag-over-target');
        }

        // 松手时根据最后记录的鼠标位置判定是否换分类
        function tryChangeCategoryAtMouse(cardId) {
            if (isSidebarCollapsed) return false;
            if (_lastMouseX === null || _lastMouseY === null) return false;
            const el = document.elementFromPoint(_lastMouseX, _lastMouseY);
            if (!el) return false;
            const catEl = el.closest('#sidebar-categories .sortable-item[data-cat-id]');
            if (!catEl || !catEl.dataset.catId || catEl.dataset.catId === 'all') return false;
            if (!categoryExists(catEl.dataset.catId)) return false;
            const card = state.cards.find(c => c.id === cardId);
            if (!card) return false;
            if (card.categoryId === catEl.dataset.catId) return false;  // 没变化就不弹 toast
            card.categoryId = catEl.dataset.catId;
            saveState();
            renderAll();
            const cat = getCategory(catEl.dataset.catId);
            showToast(`已移动到「${cat ? cat.name : '新分类'}」`, cat);
            return true;
        }

        function rebindCardSortable() {
            const grid = document.getElementById('card-grid');
            if (!grid) return;
            if (cardSortable) cardSortable.destroy();
            if (typeof Sortable === 'undefined') { cardSortable = null; return; }
            try {
            cardSortable = Sortable.create(grid, {
                group: { name: 'shared', pull: true, put: true },
                animation: 250,
                delay: 75,
                delayOnTouchOnly: false,
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                forceFallback: true,
                fallbackClass: 'sortable-drag',
                easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                filter: '.card-menu-btn',
                preventOnFilter: false,
                onStart: evt => {
                    _isDragging = true;
                    _draggedEl = evt.item;
                    _lastMouseX = null;
                    _lastMouseY = null;
                    document.body.classList.add('is-dragging');
                    const card = evt.item.querySelector('.glass-card');
                    if (card) card.style.animationName = 'none';
                    document.addEventListener('mousemove', onDragMove);
                    document.addEventListener('touchmove', onDragMove, { passive: true });
                },
                onEnd: evt => {
                    _isDragging = false;
                    document.removeEventListener('mousemove', onDragMove);
                    document.removeEventListener('touchmove', onDragMove);
                    document.body.classList.remove('is-dragging');
                    clearDropHighlights();
                    const card = evt.item.querySelector('.glass-card');
                    if (card) card.style.animationName = '';
                    const cardId = evt.item.dataset.cardId;
                    // 1) 优先：用最后记录的鼠标位置判定是否换分类（侧边栏已 put:false 不会插 DOM，位置稳定）
                    if (cardId && tryChangeCategoryAtMouse(cardId)) {
                        // 换分类成功
                    } else if (evt.from === evt.to && evt.oldIndex !== evt.newIndex) {
                        // 2) grid 内重排
                        const newOrderIds = Array.from(evt.to.children)
                            .filter(el => el.classList.contains('sortable-item'))
                            .map(el => el.dataset.cardId);
                        const reordered = newOrderIds.map(id => state.cards.find(c => c.id === id)).filter(Boolean);
                        const others = state.cards.filter(c => !newOrderIds.includes(c.id));
                        state.cards = [...reordered, ...others];
                        saveState();
                        showToast('已调整顺序');
                    } else if (evt.item.parentNode && evt.item.parentNode !== evt.from && evt.item.parentNode.id !== 'card-grid') {
                        // 3) 兜底：SortableJS 误把卡片塞到了别处，移除并重渲染
                        if (evt.item.parentNode) evt.item.parentNode.removeChild(evt.item);
                        renderAll();
                    }
                    evt.item.classList.remove('settle-bounce');
                    void evt.item.offsetWidth;
                    evt.item.classList.add('settle-bounce');
                    setTimeout(() => evt.item.classList.remove('settle-bounce'), 500);
                    _lastHoverCatId = null;
                    _lastMouseX = null;
                    _lastMouseY = null;
                    _draggedEl = null;
                }
            });
            } catch (e) {
                console.warn('SortableJS 不可用，卡片拖拽已禁用:', e);
                cardSortable = null;
            }
        }

        function rebindSidebarSortable() {
            const list = document.getElementById('sidebar-categories');
            if (!list) return;
            if (sidebarSortable) { sidebarSortable.destroy(); sidebarSortable = null; }
            if (typeof Sortable === 'undefined') return;
            try {
            // put: false —— 永远不让 SortableJS 往 sidebar DOM 插入卡片（避免布局下移导致 elementFromPoint 失效）
            // 跨列表换分类由 grid onEnd + tryChangeCategoryAtMouse 自行处理
            sidebarSortable = Sortable.create(list, {
                group: { name: 'shared', pull: false, put: false },
                animation: 250,
                delay: 75,
                delayOnTouchOnly: false,
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                forceFallback: true,
                fallbackClass: 'sortable-drag',
                easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                onStart: () => {
                    _isDragging = true;
                    _lastMouseX = null;
                    _lastMouseY = null;
                    document.body.classList.add('is-dragging');
                    document.addEventListener('mousemove', onDragMove);
                    document.addEventListener('touchmove', onDragMove, { passive: true });
                },
                onEnd: evt => {
                    _isDragging = false;
                    document.removeEventListener('mousemove', onDragMove);
                    document.removeEventListener('touchmove', onDragMove);
                    document.body.classList.remove('is-dragging');
                    clearDropHighlights();
                    if (evt.from === evt.to && evt.oldIndex !== evt.newIndex) {
                        const [moved] = state.categories.splice(evt.oldIndex, 1);
                        state.categories.splice(evt.newIndex, 0, moved);
                        saveState();
                        renderAll();
                        showToast('已调整分类顺序');
                    }
                    evt.item.classList.remove('settle-bounce');
                    void evt.item.offsetWidth;
                    evt.item.classList.add('settle-bounce');
                    setTimeout(() => evt.item.classList.remove('settle-bounce'), 500);
                    _lastHoverCatId = null;
                    _lastMouseX = null;
                    _lastMouseY = null;
                }
            });
            } catch (e) {
                console.warn('SortableJS 不可用，侧边栏拖拽已禁用:', e);
                sidebarSortable = null;
            }
        }

        // 同步 sidebar Sortable：折叠态 destroy 掉以减少监听（put 永远是 false）
        function syncSidebarSortableForState() {
            const list = document.getElementById('sidebar-categories');
            if (!list) return;
            if (isSidebarCollapsed) {
                if (sidebarSortable) { sidebarSortable.destroy(); sidebarSortable = null; }
            } else {
                if (!sidebarSortable) rebindSidebarSortable();
            }
        }

        // ============================================
        // 北京时间（精确到秒）+ 水墨风
        // ============================================
        const beijingClockEl = document.getElementById('beijing-clock');
        if (beijingClockEl) {
            const pad2 = n => String(n).padStart(2, '0');
            const updateBeijingClock = () => {
                const now = new Date();
                // 取得 UTC 毫秒数，加 8 小时 (北京 UTC+8)
                const bjMs = now.getTime() + (now.getTimezoneOffset() + 8 * 60) * 60 * 1000;
                const bj = new Date(bjMs);
                beijingClockEl.textContent = `${pad2(bj.getHours())}:${pad2(bj.getMinutes())}:${pad2(bj.getSeconds())}`;
            };
            updateBeijingClock();
            setInterval(updateBeijingClock, 1000);
        }

        // ============================================
        // 初始化
        // ============================================
        applyMobileLayoutClass();
        renderAll();
        applyTheme(state.theme);
        syncSidebarSortableForState();
        rebindCardSortable();
    });
    </script>
</body>
</html>
