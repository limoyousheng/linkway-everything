<script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('resource-grid');
            const categoryList = document.getElementById('category-list');
            let draggedItem = null;
            let longPressTimer;
            let startY = 0;
            let isDragging = false;

            // Ripple Effect Logic
            function createRipple(event) {
                const button = event.currentTarget;
                const circle = document.createElement("span");
                const diameter = Math.max(button.clientWidth, button.clientHeight);
                const radius = diameter / 2;

                const rect = button.getBoundingClientRect();
                
                // Handle touch and click coordinates
                let clientX = event.clientX;
                let clientY = event.clientY;
                if(event.type.startsWith('touch') && event.touches.length > 0) {
                    clientX = event.touches[0].clientX;
                    clientY = event.touches[0].clientY;
                }

                circle.style.width = circle.style.height = `${diameter}px`;
                circle.style.left = `${clientX - rect.left - radius}px`;
                circle.style.top = `${clientY - rect.top - radius}px`;
                circle.classList.add("ripple");

                const ripple = button.getElementsByClassName("ripple")[0];
                if (ripple) {
                    ripple.remove();
                }

                button.appendChild(circle);
                
                setTimeout(() => {
                    circle.remove();
                }, 600);
            }

            const interactiveElements = document.querySelectorAll('.interactive-element');
            interactiveElements.forEach(el => {
                // Using mousedown/touchstart for immediate ripple feedback
                el.addEventListener('mousedown', createRipple);
                el.addEventListener('touchstart', createRipple, {passive: true});
            });

            // Generic Drag and Drop Logic
            function setupDragAndDrop(container) {
                if(!container) return;
                
                container.addEventListener('touchstart', (e) => {
                    const item = e.target.closest('.draggable-item');
                    if (!item) return;
                    
                    // Don't trigger drag if touching buttons
                    if (e.target.closest('button')) return;

                    startY = e.touches[0].clientY;
                    isDragging = false;
                    
                    longPressTimer = setTimeout(() => {
                        isDragging = true;
                        draggedItem = item;
                        
                        // Stop floating animations if they exist
                        item.classList.remove('animate-float', 'animate-float-delayed-1', 'animate-float-delayed-2', 'animate-float-delayed-3');
                        
                        // Add dragging state
                        requestAnimationFrame(() => {
                            item.classList.add('dragging');
                        });
                        
                        if (navigator.vibrate) navigator.vibrate(50);
                    }, 75);
                }, {passive: true});

                container.addEventListener('touchend', (e) => {
                    clearTimeout(longPressTimer);
                    if (draggedItem) {
                        draggedItem.classList.remove('dragging');
                        
                        // Re-add float animations only for main grid items
                        if(container.id === 'resource-grid') {
                            setTimeout(() => {
                                if(draggedItem) draggedItem.classList.add('animate-float');
                                draggedItem = null;
                                isDragging = false;
                            }, 300);
                        } else {
                            draggedItem = null;
                            isDragging = false;
                        }
                    }
                }, {passive: true});

                container.addEventListener('touchmove', (e) => {
                     const currentY = e.touches[0].clientY;
                     
                     // Cancel long press if user scrolls significantly before timer fires
                     if (!isDragging && Math.abs(currentY - startY) > 10) {
                         clearTimeout(longPressTimer);
                     }

                     if (isDragging && draggedItem) {
                        e.preventDefault(); // Stop page scrolling
                        // Logic for actual reordering would go here
                     }
                }, {passive: false});
            }

            setupDragAndDrop(grid);
            setupDragAndDrop(categoryList);

            // Modal Logic
            const openBtn = document.getElementById('open-categories-btn');
            const closeBtn = document.getElementById('close-category-modal');
            const overlay = document.getElementById('category-modal-overlay');
            const modal = document.getElementById('category-modal');

            function openModal() {
                overlay.classList.add('active');
                overlay.style.animation = 'fadeIn 0.3s ease-out forwards';
                modal.classList.remove('leaving');
                modal.classList.add('entering');
            }

            function closeModal() {
                overlay.style.animation = 'fadeOut 0.2s ease-in forwards';
                modal.classList.remove('entering');
                modal.classList.add('leaving');
                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 200); // match animation duration
            }

            if(openBtn) openBtn.addEventListener('click', openModal);
            if(closeBtn) closeBtn.addEventListener('click', closeModal);
            if(overlay) overlay.addEventListener('click', closeModal);
        });
    </script>
